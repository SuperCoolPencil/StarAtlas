name: StarryAtlas
description: Generate stargazer community visuals (world map) using the GitHub GraphQL API.
author: StarryAtlas
branding:
  icon: map
  color: blue

inputs:
  owner:
    description: Repository owner (defaults to current repo).
    required: false
  repo:
    description: Repository name (defaults to current repo).
    required: false
  output-dir:
    description: Output directory for artifacts.
    required: false
    default: staratlas
  html:
    description: Also emit interactive HTML map.
    required: false
    default: "true"
  theme:
    description: Visual theme for the map (light or dark).
    required: false
    default: light

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Setup uv
      uses: astral-sh/setup-uv@v3
    - name: Install dependencies
      shell: bash
      run: uv pip install -r "${{ github.action_path }}/requirements.txt"
    - name: Run StarAtlas
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        args=()
        if [ -n "${{ inputs.owner }}" ]; then args+=("--owner" "${{ inputs.owner }}"); fi
        if [ -n "${{ inputs.repo }}" ]; then args+=("--repo" "${{ inputs.repo }}"); fi
        args+=("--output-dir" "${{ inputs.output-dir }}")
        args+=("--theme" "${{ inputs.theme }}")
        if [ "${{ inputs.html }}" = "true" ]; then args+=("--html"); fi
        python "${{ github.action_path }}/run_staratlas.py" "${args[@]}"
